<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{margin:0;font-family:Arial;background:#08111f;color:white;}

header{
  padding:15px;
  background:#0f172a;
  color:#00ff9d;
  font-weight:bold;
  font-size:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#111c31;
  padding:10px;
  border-radius:10px;
}

img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:red;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<header>LIVE ADMIN PANEL</header>
<div id="grid" class="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57OALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

db.ref("camera").on("value",(snap)=>{

  const data = snap.val() || {};
  grid.innerHTML = "";

  Object.keys(data).forEach(userId => {

    const framesObj = data[userId]?.frames || {};
    const frames = Object.values(framesObj);

    let html = "";

    frames.forEach((item, index) => {
      html += `
        <div>
          <b>Image ${index + 1}</b>
          <img src="${item.frame}">
        </div>
      `;
    });

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>👤 ${userId}</h3>
      ${html}
      <button onclick="deleteUser('${userId}')">DELETE</button>
    `;

    grid.appendChild(card);

  });

});

function deleteUser(userId){
  db.ref("camera/" + userId).remove();
}

</script>

</body>
</html>
