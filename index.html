<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  padding:20px;
  text-align:center;
  background:#111a2e;
  font-size:20px;
  font-weight:bold;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

img{
  width:100%;
  border-radius:12px;
  margin-top:8px;
}

.time{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

.btn{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.delete{
  background:#dc2626;
  color:white;
}
</style>
</head>

<body>

<header>🖥️ Admin Dashboard (Delete Enabled)</header>

<div class="container" id="grid"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA5iHHWvOKZnKlZCZz57O8ALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

// LIVE DATA
db.ref("camera").on("value", (snap) => {

  const data = snap.val();
  grid.innerHTML = "";

  if(!data){
    grid.innerHTML = "<p style='padding:20px'>No users found</p>";
    return;
  }

  Object.keys(data).forEach(userId => {

    const user = data[userId];

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>👤 ${userId}</h3>
      <img src="${user.frame}" />
      <div class="time">
        ⏰ ${new Date(user.updatedAt).toLocaleString()}
      </div>

      <button class="btn delete" onclick="deleteUser('${userId}')">
        🗑️ Delete
      </button>
    `;

    grid.appendChild(card);
  });

});

// DELETE FUNCTION
function deleteUser(userId){
  const confirmDelete = confirm("Are you sure you want to delete " + userId + "?");

  if(confirmDelete){
    db.ref("camera/" + userId).remove()
    .then(() => {
      alert("Deleted successfully");
    })
    .catch(err => {
      alert("Error deleting: " + err);
    });
  }
}

</script>

</body>
</html>
