<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Live Camera</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  padding:20px;
  text-align:center;
  background:#111a2e;
  font-size:20px;
  font-weight:bold;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
  text-align:center;
}

.card h3{
  margin:5px 0;
  font-size:16px;
}

img{
  width:100%;
  border-radius:12px;
  margin-top:8px;
  border:2px solid rgba(255,255,255,0.1);
}

.time{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}
</style>
</head>

<body>

<header>🖥️ Admin Live Camera Dashboard</header>

<div class="container" id="grid"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// 🔥 Firebase Config (same project)
const firebaseConfig = {
  apiKey: "AIzaSyA5iHHWvOKZnKlZCZz57O8ALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

// 📡 LIVE LISTENER
db.ref("camera").on("value", (snap) => {

  const data = snap.val();
  grid.innerHTML = "";

  if(!data){
    grid.innerHTML = "<p style='padding:20px'>No users found</p>";
    return;
  }

  Object.keys(data).forEach(userId => {

    const user = data[userId];

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>👤 ${userId}</h3>
      <img src="${user.frame}" />
      <div class="time">
        ⏰ ${new Date(user.updatedAt).toLocaleString()}
      </div>
    `;

    grid.appendChild(card);
  });

});
</script>

</body>
</html>
