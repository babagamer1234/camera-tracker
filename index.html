<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Timeline View</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  padding:20px;
  text-align:center;
  background:#111a2e;
  font-size:20px;
  font-weight:bold;
}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  padding:15px;
}

.userBox{
  background:#1e293b;
  padding:10px;
  border-radius:15px;
  width:300px;
}

.scroll{
  max-height:400px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

img{
  width:100%;
  border-radius:10px;
}

.btn{
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.deleteAll{
  background:#dc2626;
  color:white;
}
</style>
</head>

<body>

<header>🖥️ Admin Timeline Dashboard</header>

<div class="container" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA5iHHWvOKZnKlZCZz57O8ALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

db.ref("camera").on("value", (snap) => {

  const data = snap.val();
  grid.innerHTML = "";

  if(!data){
    grid.innerHTML = "<p>No users</p>";
    return;
  }

  Object.keys(data).forEach(userId => {

    const userBox = document.createElement("div");
    userBox.className = "userBox";

    userBox.innerHTML = `
      <h3>👤 ${userId}</h3>

      <button class="btn deleteAll" onclick="deleteAll('${userId}')">
        🗑️ Delete All
      </button>

      <div class="scroll" id="list_${userId}">
        Loading...
      </div>
    `;

    grid.appendChild(userBox);

    // load all images
    const listRef = db.ref("camera/" + userId);

    listRef.on("value", (snap2) => {

      const images = snap2.val();
      const container = document.getElementById("list_" + userId);

      container.innerHTML = "";

      if(images){

        Object.keys(images).reverse().forEach(key => {

          const item = images[key];

          const img = document.createElement("img");
          img.src = item.frame;

          container.appendChild(img);

        });

      }

    });

  });

});

// DELETE ALL USER PHOTOS
function deleteAll(userId){

  const ok = confirm("Delete ALL photos of " + userId + "?");

  if(ok){
    db.ref("camera/" + userId).remove()
    .then(()=>alert("Deleted all data"))
    .catch(err=>alert(err));
  }

}

</script>

</body>
</html>
