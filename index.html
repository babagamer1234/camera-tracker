<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:#fff;
}

header{
    padding:15px;
    text-align:center;
    background:#0f172a;
    color:#00ff9d;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #00ff9d44;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:15px;
    padding:15px;
}

.userBox{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,255,157,.15);
}

.userBox h3{
    margin:0 0 10px;
    color:#00ff9d;
}

.imgBox{
    width:100%;
    height:320px;
    background:#0f172a;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.imgBox img{
    width:100%;
    height:100%;
    object-fit:contain;
}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ef4444;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#dc2626;
}
</style>
</head>

<body>

<header>📡 MULTI USER ADMIN PANEL</header>

<div id="grid" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const grid = document.getElementById("grid");

db.ref("camera").on("value", (snapshot) => {

    const users = snapshot.val();

    grid.innerHTML = "";

    if (!users) {
        grid.innerHTML = "<h2>No Users Found</h2>";
        return;
    }

    Object.entries(users).forEach(([userId, userData]) => {

        const frame =
            userData?.frame ||
            "https://via.placeholder.com/600x400?text=No+Image";

        const card = document.createElement("div");
        card.className = "userBox";

        card.innerHTML = `
            <h3>👤 ${userId}</h3>

            <div class="imgBox">
                <img src="${frame}">
            </div>

            <button onclick="deleteUser('${userId}')">
                DELETE USER
            </button>
        `;

        grid.appendChild(card);
    });

});

function deleteUser(userId){

    if(!confirm("Delete " + userId + " ?")) return;

    db.ref("camera/" + userId)
      .remove()
      .then(() => alert("Deleted"))
      .catch(err => alert(err.message));
}
</script>

</body>
</html>
