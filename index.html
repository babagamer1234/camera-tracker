<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const grid = document.getElementById("grid");
const userCount = document.getElementById("userCount");

db.ref("camera").on("value", snap => {

    const data = snap.val();
    grid.innerHTML = "";

    if(!data){
        userCount.textContent = "Users: 0";
        grid.innerHTML = "<div class='empty'>No Users Found</div>";
        return;
    }

    const users = Object.keys(data);
    userCount.textContent = "Users: " + users.length;

    users.forEach(userId => {

        const userData = data[userId];
        const frames = userData?.frames || {};

        const frameList = Object.values(frames).reverse(); 
        // reverse = latest first

        let imagesHTML = "";

        frameList.forEach(item => {
            imagesHTML += `
              <img src="${item.frame}" 
                   style="width:100%;margin-top:10px;border-radius:10px;">
            `;
        });

        const card = document.createElement("div");

        card.className = "userBox";

        card.innerHTML = `
            <div class="cardHeader">
                <div class="userName">👤 ${userId}</div>
            </div>

            <div class="imgBox" style="height:auto;padding:10px;display:block;">
                ${imagesHTML}
            </div>

            <div class="cardFooter">
                <button class="deleteBtn" onclick="deleteUser('${userId}')">
                    DELETE USER
                </button>
            </div>
        `;

        grid.appendChild(card);
    });

});

function deleteUser(userId){
    if(!confirm("Delete " + userId + " ?")) return;

    db.ref("camera/" + userId).remove()
      .then(()=>alert("Deleted"))
      .catch(err=>alert(err.message));
}
</script>
